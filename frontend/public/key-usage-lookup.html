<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>API Key 用量查询</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --panel-soft: #f9fafb;
      --text: #172033;
      --muted: #667085;
      --line: #d9dee8;
      --primary: #2563eb;
      --primary-strong: #1d4ed8;
      --green: #0f8a5f;
      --amber: #b45309;
      --red: #c2410c;
      --shadow: 0 14px 40px rgba(23, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.15;
      font-weight: 760;
    }

    .subtle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(280px, 390px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .query {
      padding: 18px;
      position: sticky;
      top: 18px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: #344054;
      font-size: 13px;
      font-weight: 650;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 9px 11px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .inline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 720;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .button:active {
      transform: translateY(1px);
    }

    .primary {
      color: #fff;
      background: var(--primary);
    }

    .primary:hover {
      background: var(--primary-strong);
    }

    .secondary {
      color: var(--text);
      background: #fff;
      border-color: var(--line);
    }

    .secondary:hover {
      border-color: #a9b4c5;
      background: #f8fafc;
    }

    .status {
      margin-top: 14px;
      min-height: 36px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--muted);
      padding: 9px 10px;
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
    }

    .status.ok {
      border-color: rgba(15, 138, 95, 0.28);
      background: rgba(15, 138, 95, 0.08);
      color: var(--green);
    }

    .status.err {
      border-color: rgba(194, 65, 12, 0.28);
      background: rgba(194, 65, 12, 0.08);
      color: var(--red);
    }

    .results {
      display: grid;
      gap: 18px;
    }

    .hero {
      padding: 18px;
      display: grid;
      gap: 18px;
    }

    .hero-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 4px 10px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .badge.ok {
      color: var(--green);
      border-color: rgba(15, 138, 95, 0.25);
      background: rgba(15, 138, 95, 0.08);
    }

    .badge.warn {
      color: var(--amber);
      border-color: rgba(180, 83, 9, 0.25);
      background: rgba(180, 83, 9, 0.08);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--panel-soft);
      min-height: 86px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .stat .value {
      font-size: 22px;
      line-height: 1.15;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .section {
      padding: 16px 18px 18px;
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 1.3;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      background: var(--panel-soft);
    }

    td.num,
    th.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .meter {
      height: 8px;
      width: 100%;
      border-radius: 999px;
      background: #e7ebf2;
      overflow: hidden;
    }

    .meter span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: var(--primary);
    }

    .empty {
      border: 1px dashed #bac4d3;
      border-radius: 8px;
      padding: 26px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.55);
    }

    .raw {
      max-height: 360px;
      overflow: auto;
      margin: 0;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #111827;
      color: #d1d5db;
      padding: 14px;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 880px) {
      .topbar,
      .shell,
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr;
      }

      .query {
        position: static;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .app {
        width: min(100vw - 20px, 1180px);
        padding-top: 18px;
      }

      .inline,
      .stats {
        grid-template-columns: 1fr;
      }

      th,
      td {
        padding: 9px 6px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div>
        <h1>API Key 用量查询</h1>
        <p class="subtle">输入一个 API Key，直接调用网关的 /v1/usage 查询这个 key 自身用量。</p>
      </div>
      <div class="badge-row" aria-label="Capabilities">
        <span class="badge">无需登录</span>
        <span class="badge">可本地预览</span>
        <span class="badge">只读查询</span>
      </div>
    </div>

    <div class="shell">
      <section class="panel query" aria-label="查询表单">
        <form id="usage-form" class="form-grid">
          <label>
            API 地址
            <input id="base-url" name="baseUrl" autocomplete="url" spellcheck="false">
          </label>

          <label>
            API Key
            <input id="api-key" name="apiKey" type="text" autocomplete="off" spellcheck="false" placeholder="sk-...">
          </label>

          <div class="inline">
            <label>
              查询天数
              <select id="days" name="days">
                <option value="7">7</option>
                <option value="14">14</option>
                <option value="30" selected>30</option>
                <option value="60">60</option>
                <option value="90">90</option>
              </select>
            </label>
            <label>
              时区
              <input id="timezone" name="timezone" value="Asia/Shanghai" autocomplete="off" spellcheck="false">
            </label>
          </div>

          <div class="inline">
            <label>
              开始日期
              <input id="start-date" name="startDate" type="date">
            </label>
            <label>
              结束日期
              <input id="end-date" name="endDate" type="date">
            </label>
          </div>

          <div class="actions">
            <button class="button primary" type="submit">查询</button>
            <button class="button secondary hidden" id="demo" type="button">示例</button>
            <button class="button secondary" id="clear" type="button">清空</button>
          </div>
        </form>
        <div id="status" class="status">已就绪。线上访问时会自动使用当前站点域名；本地双击预览时默认使用 https://mckameila.xyz。</div>
      </section>

      <section class="results" aria-live="polite">
        <section class="panel hero">
          <div class="hero-head">
            <div>
              <h2 id="summary-title">暂无数据</h2>
              <p id="summary-subtitle" class="subtle">点击查询查看状态、额度、用量和限速窗口。</p>
            </div>
            <div id="badges" class="badge-row"></div>
          </div>
          <div id="stats" class="stats">
            <div class="stat"><div class="label">今日请求</div><div class="value">-</div></div>
            <div class="stat"><div class="label">今日 Tokens</div><div class="value">-</div></div>
            <div class="stat"><div class="label">今日费用</div><div class="value">-</div></div>
            <div class="stat"><div class="label">累计费用</div><div class="value">-</div></div>
          </div>
        </section>

        <div class="grid-2">
          <section class="panel section">
            <h2>限速额度</h2>
            <div id="rate-limits" class="empty">暂无限速数据。</div>
          </section>

          <section class="panel section">
            <h2>额度 / 余额</h2>
            <div id="quota" class="empty">暂无额度数据。</div>
          </section>
        </div>

        <section class="panel section">
          <h2>每日用量</h2>
          <div id="daily-usage" class="empty">暂无每日用量数据。</div>
        </section>

        <section class="panel section">
          <h2>模型统计</h2>
          <div id="model-stats" class="empty">暂无模型统计数据。</div>
        </section>

        <section class="panel section">
          <h2>原始响应</h2>
          <pre id="raw" class="raw">{}</pre>
        </section>
      </section>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    const form = $("usage-form");
    const statusBox = $("status");
    const baseUrlInput = $("base-url");
    const keyInput = $("api-key");
    const daysInput = $("days");
    const timezoneInput = $("timezone");
    const startDateInput = $("start-date");
    const endDateInput = $("end-date");
    const isLocalFile = location.protocol === "file:";

    function defaultBaseUrl() {
      if (location.protocol === "http:" || location.protocol === "https:") {
        return location.origin;
      }
      return "https://mckameila.xyz";
    }

    baseUrlInput.value = defaultBaseUrl();
    if (isLocalFile) {
      $("demo").classList.remove("hidden");
      setStatus("当前是本地文件预览。浏览器会阻止 file:// 页面携带 Authorization 跨域请求线上接口；示例按钮可查看渲染效果，真实查询请通过站点 URL 打开本页。", "");
    }

    function setStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = "status" + (type ? " " + type : "");
    }

    function fmtNumber(value) {
      const n = Number(value || 0);
      return new Intl.NumberFormat("en-US", { maximumFractionDigits: 2 }).format(n);
    }

    function fmtUsd(value) {
      const n = Number(value || 0);
      return "$" + n.toFixed(n >= 1 ? 4 : 6).replace(/0+$/, "").replace(/\.$/, "");
    }

    function fmtDate(value) {
      if (!value) return "-";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleString();
    }

    function esc(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function pct(used, limit) {
      const u = Number(used || 0);
      const l = Number(limit || 0);
      if (l <= 0) return 0;
      return Math.min(100, Math.max(0, (u / l) * 100));
    }

    function buildUrl() {
      const base = baseUrlInput.value.trim().replace(/\/+$/, "");
      const params = new URLSearchParams();
      params.set("days", daysInput.value || "30");
      if (timezoneInput.value.trim()) params.set("timezone", timezoneInput.value.trim());
      if (startDateInput.value) params.set("start_date", startDateInput.value);
      if (endDateInput.value) params.set("end_date", endDateInput.value);
      return base + "/v1/usage?" + params.toString();
    }

    function renderBadges(data) {
      const badges = $("badges");
      badges.innerHTML = "";
      const entries = [
        [data.isValid ? "有效" : "无效", data.isValid ? "ok" : "warn"],
        [data.status || "unknown", data.status === "active" ? "ok" : "warn"],
        [data.mode || "unknown", ""]
      ];
      for (const [text, cls] of entries) {
        const span = document.createElement("span");
        span.className = "badge" + (cls ? " " + cls : "");
        span.textContent = text;
        badges.appendChild(span);
      }
    }

    function renderSummary(data) {
      $("summary-title").textContent = data.status ? "Key 状态：" + data.status : "用量已加载";
      $("summary-subtitle").textContent = "模式：" + (data.mode || "-") + " · 单位：" + (data.unit || "USD");

      const usage = data.usage || {};
      const today = usage.today || {};
      const total = usage.total || {};
      const stats = [
        ["今日请求", fmtNumber(today.requests)],
        ["今日 Tokens", fmtNumber(today.total_tokens)],
        ["今日费用", fmtUsd(today.actual_cost)],
        ["累计费用", fmtUsd(total.actual_cost)]
      ];

      $("stats").innerHTML = stats.map(([label, value]) => (
        '<div class="stat"><div class="label">' + esc(label) + '</div><div class="value">' + esc(value) + '</div></div>'
      )).join("");
      renderBadges(data);
    }

    function renderRateLimits(data) {
      const target = $("rate-limits");
      const rows = Array.isArray(data.rate_limits) ? data.rate_limits : [];
      if (!rows.length) {
        target.className = "empty";
        target.textContent = "暂无限速数据。";
        return;
      }
      target.className = "";
      target.innerHTML = '<table><thead><tr><th>窗口</th><th class="num">已用</th><th class="num">上限</th><th class="num">剩余</th><th>重置时间</th></tr></thead><tbody>' +
        rows.map((row) => {
          const width = pct(row.used, row.limit).toFixed(2);
          return '<tr>' +
            '<td><strong>' + esc(row.window || "-") + '</strong><div class="meter"><span style="width:' + width + '%"></span></div></td>' +
            '<td class="num">' + fmtNumber(row.used) + '</td>' +
            '<td class="num">' + fmtNumber(row.limit) + '</td>' +
            '<td class="num">' + fmtNumber(row.remaining) + '</td>' +
            '<td>' + esc(fmtDate(row.reset_at)) + '</td>' +
          '</tr>';
        }).join("") +
      '</tbody></table>';
    }

    function renderQuota(data) {
      const target = $("quota");
      const quota = data.quota;
      const subscription = data.subscription;
      if (quota) {
        target.className = "";
        const width = pct(quota.used, quota.limit).toFixed(2);
        target.innerHTML = '<table><tbody>' +
          '<tr><th>总额度</th><td class="num">' + fmtUsd(quota.limit) + '</td></tr>' +
          '<tr><th>已用</th><td class="num">' + fmtUsd(quota.used) + '</td></tr>' +
          '<tr><th>剩余</th><td class="num">' + fmtUsd(quota.remaining) + '</td></tr>' +
          '<tr><th>进度</th><td><div class="meter"><span style="width:' + width + '%"></span></div></td></tr>' +
        '</tbody></table>';
        return;
      }
      if (subscription) {
        target.className = "";
        target.innerHTML = '<table><tbody>' +
          '<tr><th>日额度</th><td class="num">' + fmtUsd(subscription.daily_usage_usd) + ' / ' + fmtUsd(subscription.daily_limit_usd) + '</td></tr>' +
          '<tr><th>周额度</th><td class="num">' + fmtUsd(subscription.weekly_usage_usd) + ' / ' + fmtUsd(subscription.weekly_limit_usd) + '</td></tr>' +
          '<tr><th>月额度</th><td class="num">' + fmtUsd(subscription.monthly_usage_usd) + ' / ' + fmtUsd(subscription.monthly_limit_usd) + '</td></tr>' +
          '<tr><th>过期时间</th><td>' + esc(fmtDate(subscription.expires_at)) + '</td></tr>' +
        '</tbody></table>';
        return;
      }
      if (typeof data.balance === "number" || typeof data.remaining === "number") {
        target.className = "";
        target.innerHTML = '<table><tbody>' +
          '<tr><th>剩余</th><td class="num">' + fmtUsd(data.remaining) + '</td></tr>' +
          '<tr><th>余额</th><td class="num">' + fmtUsd(data.balance) + '</td></tr>' +
        '</tbody></table>';
        return;
      }
      target.className = "empty";
      target.textContent = "暂无额度数据。";
    }

    function renderDailyUsage(data) {
      const target = $("daily-usage");
      const rows = Array.isArray(data.daily_usage) ? data.daily_usage : [];
      if (!rows.length) {
        target.className = "empty";
        target.textContent = "暂无每日用量数据。";
        return;
      }
      target.className = "";
      target.innerHTML = '<table><thead><tr><th>日期</th><th class="num">请求数</th><th class="num">Tokens</th><th class="num">实际费用</th></tr></thead><tbody>' +
        rows.map((row) => '<tr>' +
          '<td>' + esc(row.date || "-") + '</td>' +
          '<td class="num">' + fmtNumber(row.requests) + '</td>' +
          '<td class="num">' + fmtNumber(row.total_tokens) + '</td>' +
          '<td class="num">' + fmtUsd(row.actual_cost) + '</td>' +
        '</tr>').join("") +
      '</tbody></table>';
    }

    function renderModelStats(data) {
      const target = $("model-stats");
      const rows = Array.isArray(data.model_stats) ? data.model_stats : [];
      if (!rows.length) {
        target.className = "empty";
        target.textContent = "暂无模型统计数据。";
        return;
      }
      target.className = "";
      target.innerHTML = '<table><thead><tr><th>模型</th><th class="num">请求数</th><th class="num">Tokens</th><th class="num">实际费用</th></tr></thead><tbody>' +
        rows.map((row) => '<tr>' +
          '<td>' + esc(row.model || "-") + '</td>' +
          '<td class="num">' + fmtNumber(row.requests) + '</td>' +
          '<td class="num">' + fmtNumber(row.total_tokens) + '</td>' +
          '<td class="num">' + fmtUsd(row.actual_cost) + '</td>' +
        '</tr>').join("") +
      '</tbody></table>';
    }

    function render(data) {
      renderSummary(data);
      renderRateLimits(data);
      renderQuota(data);
      renderDailyUsage(data);
      renderModelStats(data);
      $("raw").textContent = JSON.stringify(data, null, 2);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const key = keyInput.value.trim();
      if (!key) {
        setStatus("请先输入 API Key。", "err");
        keyInput.focus();
        return;
      }

      const url = buildUrl();
      setStatus("正在查询：" + url, "");
      if (isLocalFile) {
        setStatus("本地 file:// 页面发起带 Authorization 的跨域请求通常会被浏览器 CORS 拦截。请通过 https://mckameila.xyz/key-usage-lookup.html 打开后查询。", "err");
        return;
      }

      try {
        const response = await fetch(url, {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + key,
            "Accept": "application/json"
          }
        });
        const text = await response.text();
        let data;
        try {
          data = text ? JSON.parse(text) : {};
        } catch (err) {
          throw new Error("HTTP " + response.status + ": " + text);
        }
        if (!response.ok) {
          throw new Error("HTTP " + response.status + ": " + JSON.stringify(data));
        }
        render(data);
        setStatus("查询成功。HTTP " + response.status + "。", "ok");
      } catch (err) {
        setStatus(err && err.message ? err.message : String(err), "err");
      }
    });

    $("demo").addEventListener("click", () => {
      const now = new Date();
      const date = (offset) => {
        const d = new Date(now);
        d.setDate(d.getDate() + offset);
        return d.toISOString().slice(0, 10);
      };
      const demo = {
        isValid: true,
        mode: "quota_limited",
        status: "active",
        unit: "USD",
        rate_limits: [
